name:  Backend CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  code-quality:
    name:  Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name:  Checkout Code
        uses: actions/checkout@v3

      - name:  Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name:  Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Backend/pom.xml') }}

      - name:  Grant execute permission
        run: chmod +x mvnw
        working-directory: Backend

      - name:  Check Code Style
        run: ./mvnw checkstyle:check || true
        working-directory: Backend

      - name:  Show Project Info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Run Number: ${{ github.run_number }}"

  build-and-deploy:
    name:  Build and Deploy
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name:  Checkout Code
        uses: actions/checkout@v3

      - name:  Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name:  Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Backend/pom.xml') }}

      - name:  Grant execute permission
        run: chmod +x mvnw
        working-directory: Backend

      - name: 🏗️ Build JAR
        run: ./mvnw clean package -DskipTests
        working-directory: Backend

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostel-backend-v${{ github.run_number }}
          path: Backend/target/*.jar

      - name: 🏷️ Generate Image Tag
        run: |
          echo "IMAGE_TAG=v1.${{ github.run_number }}" >> $GITHUB_ENV
          echo "Image tag will be: v1.${{ github.run_number }}"

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hostel-backend:${{ env.IMAGE_TAG }} ./Backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hostel-backend:latest ./Backend
          docker push ${{ secrets.DOCKER_USERNAME }}/hostel-backend:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/hostel-backend:latest

      - name: ✅ Deploy Success Message
        run: |
          echo "==============================================="
          echo "✅ Build and Deploy Completed!"
          echo "Version : v1.${{ github.run_number }}"
          echo "Image   : ${{ secrets.DOCKER_USERNAME }}/hostel-backend:${{ env.IMAGE_TAG }}"
          echo "JAR uploaded as artifact successfully!"
          echo "==============================================="

  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: 📊 Final Summary
        run: |
          echo "==============================================="
          echo "🎉 CD Pipeline Completed!"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Run No  : ${{ github.run_number }}"
          echo "Docker  : ${{ secrets.DOCKER_USERNAME }}/hostel-backend:latest"
          echo "Status  : SUCCESS ✅"
          echo "==============================================="
