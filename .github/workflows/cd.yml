name: 🚀 Backend CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  code-quality:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚡ Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Backend/pom.xml') }}

      - name: 🔐 Grant execute permission
        run: chmod +x mvnw
        working-directory: Backend

      - name: 🔍 Check Code Style
        run: ./mvnw checkstyle:check || true
        working-directory: Backend

      - name: 📊 Show Project Info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Run Number: ${{ github.run_number }}"

  build-and-deploy:
    name: 🏗️ Build and Deploy
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚡ Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Backend/pom.xml') }}

      - name: 🔐 Grant execute permission
        run: chmod +x mvnw
        working-directory: Backend

      - name: 🏗️ Build JAR
        run: ./mvnw clean package -DskipTests
        working-directory: Backend

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostel-backend-v${{ github.run_number }}
          path: Backend/target/*.jar

      - name: 🏷️ Generate Release Tag
        run: |
          echo "RELEASE_TAG=v1.${{ github.run_number }}" >> $GITHUB_ENV
          echo "Release version: v1.${{ github.run_number }}"

      - name: ✅ Deploy Success Message
        run: |
          echo "==============================================="
          echo "✅ Build and Deploy Completed!"
          echo "Version : v1.${{ github.run_number }}"
          echo "JAR uploaded as artifact successfully!"
          echo "==============================================="

  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: 📊 Final Summary
        run: |
          echo "==============================================="
          echo "🎉 CD Pipeline Completed!"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Run No  : ${{ github.run_number }}"
          echo "Status  : SUCCESS ✅"
          echo "==============================================="
