name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Java
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Give permission to mvnw
      - name: Grant execute permission
        run: chmod +x mvnw

      # 4. Cache Maven dependencies (faster builds)
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # 5. Build project
      - name: Build Project
        run: ./mvnw clean package -DskipTests

      # 6. Run tests (optional safety)
      - name: Run Tests
        run: ./mvnw test || true

      # 7. Upload JAR artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

      # 8. Build Docker image (DevOps touch 🔥)
      - name: Build Docker Image
        run: docker build -t hostel-backend .